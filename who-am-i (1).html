<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Who Are You, Really?</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #080810;
    --paper: #f0ebe0;
    --gold: #d4a843;
    --amber: #e07b39;
    --rose: #c45c7a;
    --teal: #3aada8;
    --violet: #7c5cbf;
    --sage: #5a9e6f;
    --sky: #4a8fc4;
    --mist: #8fa8bb;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--ink); color: var(--paper); font-family: 'Space Mono', monospace; min-height: 100vh; overflow-x: hidden; }

  #intro {
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 40px; position: relative; overflow: hidden;
    background: radial-gradient(ellipse at 20% 60%, rgba(212,168,67,0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 30%, rgba(58,173,168,0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 55% 80%, rgba(196,92,122,0.05) 0%, transparent 45%);
  }
  .big-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(52px,11vw,104px); font-weight: 300; line-height: 0.95; letter-spacing: -2px; margin-bottom: 28px; animation: fadeUp 1s ease both; }
  .big-title em { color: var(--gold); font-style: italic; }
  .big-title .rose { color: var(--rose); }
  .subtitle { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--mist); margin-bottom: 64px; animation: fadeUp 1s 0.3s ease both; opacity: 0; }
  .start-btn { background: none; border: 1px solid var(--gold); color: var(--gold); font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; padding: 20px 56px; cursor: pointer; transition: all 0.4s; animation: fadeUp 1s 0.6s ease both; opacity: 0; position: relative; overflow: hidden; }
  .start-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--gold), var(--amber)); transform: translateX(-100%); transition: transform 0.4s; }
  .start-btn span { position: relative; z-index: 1; }
  .start-btn:hover { color: var(--ink); }
  .start-btn:hover::before { transform: translateX(0); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

  #questions { display: none; min-height: 100vh; }
  .progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, var(--gold), var(--rose), var(--teal)); transition: width 0.6s ease; z-index: 100; }
  .question-container { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 60px clamp(28px,9vw,140px); }
  .q-number { font-size: 10px; letter-spacing: 5px; color: var(--amber); text-transform: uppercase; margin-bottom: 36px; opacity: 0; animation: fadeUp 0.6s 0.1s ease forwards; }
  .q-text { font-family: 'Cormorant Garamond', serif; font-size: clamp(30px,5.5vw,58px); font-weight: 300; line-height: 1.25; margin-bottom: 14px; max-width: 820px; opacity: 0; animation: fadeUp 0.6s 0.2s ease forwards; }
  .q-hint { font-size: 11px; color: var(--mist); letter-spacing: 1px; margin-bottom: 52px; opacity: 0; animation: fadeUp 0.6s 0.3s ease forwards; font-style: italic; }
  .answer-area { max-width: 720px; opacity: 0; animation: fadeUp 0.6s 0.4s ease forwards; }
  .answer-area textarea { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(212,168,67,0.25); color: var(--paper); font-family: 'Cormorant Garamond', serif; font-size: clamp(18px,2.8vw,26px); font-weight: 300; padding: 16px 0; resize: none; outline: none; min-height: 130px; line-height: 1.7; transition: border-color 0.3s; }
  .answer-area textarea::placeholder { color: rgba(240,235,224,0.18); font-style: italic; }
  .answer-area textarea:focus { border-bottom-color: var(--gold); }
  .next-btn { margin-top: 36px; background: none; border: none; color: var(--teal); font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 14px; transition: gap 0.3s, color 0.3s; }
  .next-btn:hover { gap: 24px; color: var(--gold); }
  .arr { display: inline-block; transition: transform 0.3s; }
  .next-btn:hover .arr { transform: translateX(8px); }
  .error-msg { color: var(--rose); font-size: 11px; margin-top: 14px; display: none; }

  #loading { display: none; min-height: 100vh; align-items: center; justify-content: center; flex-direction: column; gap: 36px; text-align: center; padding: 40px; }
  .loading-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(26px,4vw,44px); font-weight: 300; color: var(--gold); animation: breathe 2.5s ease infinite; }
  @keyframes breathe { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.98); } }
  .loading-sub { font-size: 10px; letter-spacing: 4px; color: var(--mist); text-transform: uppercase; }
  .loading-bar { width: 200px; height: 2px; background: rgba(212,168,67,0.15); position: relative; overflow: hidden; }
  .loading-bar::after { content: ''; position: absolute; left: -60%; width: 60%; height: 100%; background: linear-gradient(90deg, transparent, var(--gold), var(--rose), var(--teal), transparent); animation: sweep 1.8s ease infinite; }
  @keyframes sweep { to { left: 100%; } }

  #result { display: none; padding: 80px clamp(28px,8vw,120px); max-width: 1100px; margin: 0 auto; }
  .result-header { text-align: center; margin-bottom: 90px; padding-bottom: 70px; border-bottom: 1px solid rgba(212,168,67,0.15); }
  .eyebrow { font-size: 10px; letter-spacing: 5px; color: var(--amber); text-transform: uppercase; margin-bottom: 20px; }
  .result-header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(40px,7vw,80px); font-weight: 300; line-height: 1.1; color: var(--gold); }

  .result-section { margin-bottom: 72px; opacity: 0; transform: translateY(32px); transition: all 0.9s ease; }
  .result-section.visible { opacity: 1; transform: translateY(0); }

  .section-label { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 24px; display: flex; align-items: center; gap: 14px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: currentColor; opacity: 0.2; }
  .label-you { color: var(--rose); }
  .label-born { color: var(--teal); }
  .label-gap { color: var(--violet); }
  .label-step { color: var(--sage); }

  .section-text { font-family: 'Cormorant Garamond', serif; font-size: clamp(18px,2.2vw,24px); font-weight: 300; line-height: 1.9; color: var(--paper); }
  .section-text p { margin-bottom: 18px; }
  .step-text { font-family: 'Cormorant Garamond', serif; font-size: clamp(20px,2.8vw,30px); font-weight: 300; line-height: 1.7; color: var(--sage); padding: 32px 28px; border-left: 3px solid var(--sage); }

  .maps-wrapper { margin-top: 90px; padding-top: 70px; border-top: 1px solid rgba(240,235,224,0.08); }
  .maps-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(32px,5vw,56px); font-weight: 300; text-align: center; margin-bottom: 12px; color: var(--paper); }
  .maps-subtitle { text-align: center; font-size: 10px; letter-spacing: 4px; color: var(--mist); text-transform: uppercase; margin-bottom: 72px; }
  .map-block { margin-bottom: 80px; }
  .map-label { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 20px; text-align: center; }
  .road-svg { width: 100%; display: block; border-radius: 6px; }

  .restart-btn { display: block; margin: 80px auto 60px; background: none; border: 1px solid rgba(240,235,224,0.15); color: var(--mist); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 4px; text-transform: uppercase; padding: 16px 40px; cursor: pointer; transition: all 0.3s; }
  .restart-btn:hover { border-color: var(--paper); color: var(--paper); }

  body::after { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E"); pointer-events: none; opacity: 0.5; z-index: 9999; }
</style>
</head>
<body>

<div id="intro">
  <h1 class="big-title">Who are<br>you, <em>really?</em><br><span class="rose">Really.</span></h1>
  <p class="subtitle">A mirror you have never looked into</p>
  <button class="start-btn" onclick="startJourney()"><span>Begin the journey</span></button>
</div>

<div id="questions">
  <div class="progress-bar" id="progress"></div>
  <div id="question-area"></div>
</div>

<div id="loading">
  <p class="loading-title">Listening to everything you just said...</p>
  <p class="loading-sub">This takes a moment</p>
  <div class="loading-bar"></div>
</div>

<div id="result"></div>

<script>
const questions = [
  { number:"01 / 10", text:"What did you want to be when you were 7 years old, before anyone told you that was unrealistic?", hint:"Not what you said to impress adults. The real answer.", placeholder:"I wanted to..." },
  { number:"02 / 10", text:"What do you do when nobody is watching and there is no reward?", hint:"The thing you would do at 2am for no reason at all.", placeholder:"I find myself..." },
  { number:"03 / 10", text:"What injustice in the world makes you so angry you cannot sleep?", hint:"Not what you think you should care about. What actually keeps you up.", placeholder:"It is the fact that..." },
  { number:"04 / 10", text:"Describe a moment, just one, where you felt completely and undeniably yourself.", hint:"When did time disappear and you forgot to perform?", placeholder:"It was when..." },
  { number:"05 / 10", text:"What did you give up, a dream, a version of yourself, a path, that you still think about?", hint:"Be honest. The thing that surfaces sometimes when it is quiet.", placeholder:"I let go of..." },
  { number:"06 / 10", text:"What do people always come to you for, even without asking?", hint:"Your natural gift. The thing others see before you do.", placeholder:"People come to me when they need..." },
  { number:"07 / 10", text:"If money, status, and judgment did not exist, what would you spend your days doing?", hint:"No one is watching. No one is grading you.", placeholder:"I would spend my time..." },
  { number:"08 / 10", text:"What does your ideal Tuesday look like, not vacation, just a regular day in the life you actually want?", hint:"Morning to night. Be specific.", placeholder:"I wake up and..." },
  { number:"09 / 10", text:"What is the one thing you know deeply, from lived experience, that most people do not?", hint:"Something hard-won. Your private wisdom.", placeholder:"I know that..." },
  { number:"10 / 10", text:"Complete this sentence honestly: The version of me I am most afraid to become is... and then tell me what one thing is keeping you from the version you most want to be?", hint:"The fear underneath the fear.", placeholder:"The version I am afraid to become is..." }
];

let currentQ = 0;
const answers = [];

function startJourney() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('questions').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('progress').style.width = ((currentQ / questions.length) * 100) + '%';
  document.getElementById('question-area').innerHTML = `
    <div class="question-container">
      <div class="q-number">${q.number}</div>
      <div class="q-text">${q.text}</div>
      <div class="q-hint">${q.hint}</div>
      <div class="answer-area">
        <textarea id="ans" placeholder="${q.placeholder}" rows="4"></textarea>
        <p class="error-msg" id="err">Please share something, even just a few words.</p>
        <button class="next-btn" onclick="nextQuestion()">${currentQ < questions.length - 1 ? 'Continue' : 'Reveal who I am'} <span class="arr">&#8594;</span></button>
      </div>
    </div>`;
  setTimeout(() => { const a = document.getElementById('ans'); if(a) a.focus(); }, 700);
}

function nextQuestion() {
  const el = document.getElementById('ans');
  if (!el || !el.value.trim()) { document.getElementById('err').style.display = 'block'; return; }
  answers.push({ question: questions[currentQ].text, answer: el.value.trim() });
  currentQ++;
  if (currentQ >= questions.length) submitToAI();
  else renderQuestion();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && document.getElementById('ans')) { e.preventDefault(); nextQuestion(); }
});

function stripDashes(obj) {
  if (typeof obj === 'string') return obj.replace(/\u2014/g,',').replace(/\u2013/g,',').replace(/ - /g,', ');
  if (Array.isArray(obj)) return obj.map(stripDashes);
  if (obj && typeof obj === 'object') { const o={}; for(const k in obj) o[k]=stripDashes(obj[k]); return o; }
  return obj;
}

async function submitToAI() {
  document.getElementById('questions').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';

  const formatted = answers.map((a,i) => `Q${i+1}: ${a.question}\nAnswer: ${a.answer}`).join('\n\n');

  const prompt = `You are a profound life guide who sees people with radical honesty and deep compassion. Based on these 10 answers, write a portrait of this person.

Answers:
${formatted}

Return ONLY raw JSON, no markdown, no backticks. Use this exact structure. Do NOT use em dashes or hyphens between words anywhere in your response. Use commas instead.

{
  "name_for_them": "A poetic 3 to 4 word phrase capturing their essence. No hyphens.",
  "who_you_are": "One paragraph, 5 to 7 sentences. Be very specific to their answers. Name what they carry inside them, what drives them, what they have been hiding. Make them feel seen in a way they have never felt seen before.",
  "who_you_were_born_to_be": "One paragraph, 5 to 7 sentences. The uncompromised version of them. What they could build or become if they stopped apologising for their full range. Ground it in their actual answers. Make it ache with possibility.",
  "the_gap": "One paragraph, 4 to 5 sentences. Name precisely what the world did to shrink them. The specific fear or story they are living inside. The sentence someone said to them that they have been obeying ever since.",
  "first_step": "One single sentence. The smallest meaningful action they could take this week.",
  "road_you": {
    "title": "The Road You Have Been On",
    "start": "Where your journey began in 4 to 6 words",
    "stops": [
      { "label": "Stop 1 name in 3 to 4 words", "note": "One sentence about this part of your story" },
      { "label": "Stop 2 name in 3 to 4 words", "note": "One sentence about this part of your story" },
      { "label": "Stop 3 name in 3 to 4 words", "note": "One sentence about this part of your story" },
      { "label": "Stop 4 name in 3 to 4 words", "note": "One sentence about this part of your story" }
    ],
    "destination": "Who you are at your core right now in 5 to 8 words"
  },
  "road_born": {
    "title": "The Road You Were Born to Take",
    "start": "The moment you choose yourself in 4 to 6 words",
    "stops": [
      { "label": "Stop 1 name in 3 to 4 words", "note": "One sentence about this step toward your real self" },
      { "label": "Stop 2 name in 3 to 4 words", "note": "One sentence about this step toward your real self" },
      { "label": "Stop 3 name in 3 to 4 words", "note": "One sentence about this step toward your real self" },
      { "label": "Stop 4 name in 3 to 4 words", "note": "One sentence about this step toward your real self" }
    ],
    "destination": "Your fullest most alive self in 5 to 8 words"
  }
}`;

  let data;
  try {
    const res = await fetch("https://ai-gateway.andrew.cmu.edu/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": "sk-6Vv2ZDj_G8_Q7zjAQ6hqUw", "anthropic-version": "2023-06-01" },
      body: JSON.stringify({ model: "claude-haiku-4-5-20251001", max_tokens: 3000, messages: [{ role: "user", content: prompt }] })
    });
    const raw = await res.json();
    const txt = raw.content[0].text;
    try { data = JSON.parse(txt); } catch { data = JSON.parse(txt.replace(/```json|```/g,'').trim()); }
  } catch(e) {
    try {
      const res2 = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": "sk-ant-api03-placeholder", "anthropic-version": "2023-06-01" },
        body: JSON.stringify({ model: "claude-haiku-4-5-20251001", max_tokens: 3000, messages: [{ role: "user", content: prompt }] })
      });
      const raw2 = await res2.json();
      const txt2 = raw2.content[0].text;
      try { data = JSON.parse(txt2); } catch { data = JSON.parse(txt2.replace(/```json|```/g,'').trim()); }
    } catch { data = getFallback(); }
  }

  data = stripDashes(data);
  showResult(data);
}

function getFallback() {
  return {
    name_for_them: "The Quiet Fire",
    who_you_are: "You have spent a long time being careful. Not because you are timid, but because somewhere along the way you learned that your full range was too much, too loud, too specific for the rooms you were in. You carry a private world of ideas and feelings that runs much deeper than what you show, and you give people a curated version, the safe one, the one that fits. The injustice that keeps you up is not an abstract cause; it is personal, it lives in your body. You are someone who sees the gap between what is and what should be before anyone else in the room does, and that gift has made you both extraordinary and lonely.",
    who_you_were_born_to_be: "The version of you that never apologised for its full range does not just help people; it builds something that lasts. It creates a room, a practice, a body of work, a movement, where the thing that has always made you feel like too much becomes the very reason people come. You were born to translate the complicated into the true, to make people feel less alone in their specific and private strangeness. The world already has enough versions of the safe choice. It is missing the thing that only you can see, and you know exactly what that thing is.",
    the_gap: "The world taught you early that security comes from fitting the shape of what is expected, and you learned that lesson so well it became invisible to you. You are living inside a story that says your real self is a risk, that wanting the life you actually want is naive or arrogant or somehow wrong. The gap is not talent and it is not opportunity. It is a sentence someone said to you years ago that you have been quietly obeying ever since.",
    first_step: "Write one paragraph describing the project you have been not ready for, as if it already exists and you are proud of it, then send it to one person who would not try to fix it.",
    road_you: {
      title: "The Road You Have Been On",
      start: "A child full of big quiet dreams",
      stops: [
        { label: "The first compromise", note: "You learned to fold yourself smaller to fit the room you were given." },
        { label: "The hidden gift", note: "Something you were naturally brilliant at that you stopped mentioning out loud." },
        { label: "The anger becoming fuel", note: "The injustice you could not look away from even when others did." },
        { label: "The person people find", note: "The one they call when they are lost, who always shows up and never asks for much back." }
      ],
      destination: "The keeper of what others cannot name"
    },
    road_born: {
      title: "The Road You Were Born to Take",
      start: "The moment you choose yourself",
      stops: [
        { label: "The first honest choice", note: "One decision made from desire rather than safety, however small." },
        { label: "The work that scares you", note: "The thing you would build if you stopped waiting to feel ready." },
        { label: "The room you create", note: "A place where your full range is not too much but exactly enough." },
        { label: "The ripple going outward", note: "Other people becoming more themselves because you stopped shrinking yours." }
      ],
      destination: "Someone who lived their actual life"
    }
  };
}

function showResult(data) {
  document.getElementById('loading').style.display = 'none';
  const result = document.getElementById('result');
  result.style.display = 'block';
  result.innerHTML = `
    <div class="result-header">
      <p class="eyebrow">You are</p>
      <h1>${data.name_for_them}</h1>
    </div>
    <div class="result-section" id="sec1">
      <p class="section-label label-you">Who you are</p>
      <div class="section-text"><p>${data.who_you_are}</p></div>
    </div>
    <div class="result-section" id="sec2">
      <p class="section-label label-born">Who you were born to be</p>
      <div class="section-text"><p>${data.who_you_were_born_to_be}</p></div>
    </div>
    <div class="result-section" id="sec3">
      <p class="section-label label-gap">What the world made of you</p>
      <div class="section-text"><p>${data.the_gap}</p></div>
    </div>
    <div class="result-section" id="sec4">
      <p class="section-label label-step">Your first step this week</p>
      <div class="step-text">${data.first_step}</div>
    </div>
    <div class="maps-wrapper result-section" id="sec5">
      <h2 class="maps-title">Your Two Roads</h2>
      <p class="maps-subtitle">The road you have been on and the one you were always meant to take</p>
      <div class="map-block">
        <p class="map-label" style="color:#c45c7a">${data.road_you.title}</p>
        ${buildRoad(data.road_you, '#c45c7a', '#e07b39', '#1a0c12')}
      </div>
      <div class="map-block">
        <p class="map-label" style="color:#3aada8">${data.road_born.title}</p>
        ${buildRoad(data.road_born, '#3aada8', '#7c5cbf', '#091818')}
      </div>
    </div>
    <button class="restart-btn" onclick="location.reload()">Begin again</button>`;

  const obs = new IntersectionObserver(entries => entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }), { threshold: 0.08 });
  document.querySelectorAll('.result-section').forEach(s => obs.observe(s));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function buildRoad(road, col1, col2, bg) {
  const W = 960, H = 480;
  const roadY = H / 2;
  const roadH = 56;
  const padX = 70;
  const stops = road.stops;
  const allNodes = [road.start, ...stops.map(s=>s.label), road.destination];
  const notes = ['', ...stops.map(s=>s.note), ''];
  const N = allNodes.length;
  const xs = allNodes.map((_,i) => padX + i * ((W - padX*2) / (N-1)));

  // Road curve control points (gentle S-curve feel)
  function curvePath(offsetY) {
    return xs.map((x,i) => {
      const oy = offsetY * (i % 2 === 0 ? 1 : -1) * 3;
      return (i===0?'M':'L') + ` ${x} ${roadY + oy}`;
    }).join(' ');
  }

  const topCurve = xs.map((x,i) => (i===0?'M':'L') + ` ${x} ${roadY - roadH/2 + (i%2===0?3:-3)}`).join(' ');
  const botCurve = xs.slice().reverse().map((x,i) => {
    const ri = N-1-i;
    return 'L' + ` ${x} ${roadY + roadH/2 + (ri%2===0?-3:3)}`;
  }).join(' ');
  const roadShape = topCurve + ' ' + botCurve + ' Z';
  const centerLine = xs.map((x,i) => (i===0?'M':'L') + ` ${x} ${roadY}`).join(' ');

  // Tree icons along road
  function tree(x, y, c) {
    return `<polygon points="${x},${y-14} ${x-8},${y} ${x+8},${y}" fill="${c}" opacity="0.35"/>
            <rect x="${x-1.5}" y="${y}" width="3" height="6" fill="${c}" opacity="0.3"/>`;
  }

  let svg = `<svg class="road-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rg${W}${col1.replace('#','')}" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="${col1}" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="${col2}" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="${col1}" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="sky${W}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${bg}"/>
      <stop offset="100%" stop-color="#08080f"/>
    </linearGradient>
    <filter id="fg${W}"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="fg2${W}"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>

  <!-- Sky -->
  <rect width="${W}" height="${H}" fill="url(#sky${W})"/>

  <!-- Horizon glow -->
  <ellipse cx="${W/2}" cy="${roadY}" rx="${W*0.7}" ry="60" fill="${col1}" opacity="0.06" filter="url(#fg2${W})"/>

  <!-- Ground -->
  <rect x="0" y="${roadY + roadH/2 - 2}" width="${W}" height="${H - roadY - roadH/2 + 2}" fill="rgba(0,0,0,0.4)"/>

  <!-- Grass texture lines -->
  ${Array.from({length:12},(_,i)=>{
    const gx = 20 + i * 80;
    return `<line x1="${gx}" y1="${roadY+roadH/2+2}" x2="${gx+6}" y2="${roadY+roadH/2+12}" stroke="rgba(90,158,111,0.25)" stroke-width="1.5"/>`;
  }).join('')}

  <!-- Trees -->
  ${[80,160,240,320,640,720,800,880].map(x => tree(x, roadY - roadH/2 - 18, col1)).join('')}
  ${[80,160,240,320,640,720,800,880].map(x => tree(x, roadY + roadH/2 + 22, col2)).join('')}

  <!-- Road glow -->
  <path d="${roadShape}" fill="${col1}" opacity="0.07" filter="url(#fg2${W})"/>

  <!-- Road surface -->
  <path d="${roadShape}" fill="url(#rg${W}${col1.replace('#','')})" opacity="0.22"/>

  <!-- Road edges -->
  <path d="${topCurve}" fill="none" stroke="${col1}" stroke-width="2.5" opacity="0.7"/>
  <path d="${xs.slice().reverse().map((x,i)=>{const ri=N-1-i; return 'L'+` ${x} ${roadY+roadH/2+(ri%2===0?-3:3)}`}).join(' ').replace(/^L/,'M')}" fill="none" stroke="${col1}" stroke-width="2.5" opacity="0.7"/>

  <!-- Road stripes (dashes) -->
  <path d="${centerLine}" fill="none" stroke="rgba(255,255,200,0.2)" stroke-width="2" stroke-dasharray="20,16"/>

  <!-- Side stripes -->
  <path d="${xs.map((x,i)=>(i===0?'M':'L')+` ${x} ${roadY - roadH/2 + 10 + (i%2===0?2:-2)}`).join(' ')}" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-dasharray="12,10"/>
  <path d="${xs.map((x,i)=>(i===0?'M':'L')+` ${x} ${roadY + roadH/2 - 10 + (i%2===0?-2:2)}`).join(' ')}" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-dasharray="12,10"/>
  `;

  // Draw connection glow
  for (let i=0; i<N-1; i++) {
    svg += `<line x1="${xs[i]}" y1="${roadY}" x2="${xs[i+1]}" y2="${roadY}" stroke="${col2}" stroke-width="4" opacity="0.2" filter="url(#fg${W})"/>`;
  }

  // Nodes
  allNodes.forEach((label, i) => {
    const x = xs[i];
    const isFirst = i === 0;
    const isLast = i === N-1;
    const r = isFirst || isLast ? 20 : 14;
    const nc = isLast ? col2 : col1;
    const isUp = i % 2 === 0;
    const note = notes[i];

    // Sign post
    svg += `<line x1="${x}" y1="${roadY - roadH/2}" x2="${x}" y2="${roadY - roadH/2 - (isUp?90:0)}" stroke="${nc}" stroke-width="2" opacity="0.4"/>`;
    svg += `<line x1="${x}" y1="${roadY + roadH/2}" x2="${x}" y2="${roadY + roadH/2 + (!isUp?60:0)}" stroke="${nc}" stroke-width="2" opacity="0.4"/>`;

    // Node glow
    svg += `<circle cx="${x}" cy="${roadY}" r="${r+12}" fill="${nc}" opacity="0.1" filter="url(#fg${W})"/>`;
    // Node
    svg += `<circle cx="${x}" cy="${roadY}" r="${r}" fill="#08080f" stroke="${nc}" stroke-width="${isFirst||isLast?2.5:2}"/>`;
    svg += `<circle cx="${x}" cy="${roadY}" r="${isFirst||isLast?9:5}" fill="${nc}" opacity="${isFirst||isLast?0.9:0.7}"/>`;

    function wrapSvgText(text, maxChars, x, startY, color, fsize, anchor, italic) {
      const words = text.split(' ');
      const lines = []; let cur = '';
      words.forEach(w => {
        if ((cur+' '+w).trim().length > maxChars) { if(cur) lines.push(cur); cur=w; }
        else cur = (cur+' '+w).trim();
      });
      if(cur) lines.push(cur);
      return lines.map((l,li) =>
        `<text x="${x}" y="${startY + li*14}" text-anchor="${anchor}" fill="${color}" font-family="${italic?'Cormorant Garamond, serif':'Space Mono, monospace'}" font-size="${fsize}" ${italic?'font-style="italic"':''} opacity="0.9">${l}</text>`
      ).join('');
    }

    if (isUp) {
      // Label above road
      const lblY = roadY - roadH/2 - 88;
      svg += wrapSvgText(label, 16, x, lblY, nc, 10, 'middle', false);
      if (note) svg += wrapSvgText(note, 20, x, lblY + 28, 'rgba(240,235,224,0.5)', 9, 'middle', true);
    } else {
      // Label below road
      const lblY = roadY + roadH/2 + 22;
      svg += wrapSvgText(label, 16, x, lblY, nc, 10, 'middle', false);
      if (note) svg += wrapSvgText(note, 20, x, lblY + 18, 'rgba(240,235,224,0.5)', 9, 'middle', true);
    }
  });

  // Forward arrow
  const ex = xs[N-1];
  svg += `<polyline points="${ex+20},${roadY-7} ${ex+34},${roadY} ${ex+20},${roadY+7}" fill="none" stroke="${col2}" stroke-width="2.5" stroke-linejoin="round" opacity="0.85"/>`;

  // Sun/moon at horizon behind last node
  svg += `<circle cx="${ex}" cy="${roadY}" r="28" fill="${col2}" opacity="0.08" filter="url(#fg2${W})"/>`;

  svg += `</svg>`;
  return svg;
}
</script>
</body>
</html>
