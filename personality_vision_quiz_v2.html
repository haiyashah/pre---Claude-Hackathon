
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; min-height: 100vh; background: #0d0b1e; }
#app { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; }
.stars { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
.star { position:absolute; background:white; border-radius:50%; animation:twinkle linear infinite; }
@keyframes twinkle { 0%,100%{opacity:.2;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }
.screen { display:none; width:100%; max-width:680px; position:relative; z-index:1; }
.screen.active { display:flex; flex-direction:column; align-items:center; }
.intro-blob { background:linear-gradient(135deg,#6c2cff,#ff2c78); border-radius:40px; padding:52px 40px 44px; text-align:center; box-shadow:0 30px 80px rgba(108,44,255,.5); animation:float 4s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.intro-emoji { font-size:76px; margin-bottom:14px; display:block; }
.intro-title { font-family:'Fredoka One',cursive; font-size:44px; color:#fff; line-height:1.1; margin-bottom:12px; }
.intro-sub { font-size:17px; color:rgba(255,255,255,.85); line-height:1.6; margin-bottom:28px; }
.tag-row { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:28px; }
.tag { background:rgba(255,255,255,.2); color:#fff; border-radius:50px; padding:6px 18px; font-size:14px; font-weight:700; }
.btn-start { background:#fff; color:#6c2cff; font-family:'Fredoka One',cursive; font-size:24px; border:none; border-radius:60px; padding:16px 52px; cursor:pointer; box-shadow:0 8px 32px rgba(0,0,0,.3); transition:transform .15s,box-shadow .15s; }
.btn-start:hover { transform:scale(1.06); }
.progress-wrap { width:100%; max-width:680px; margin-bottom:18px; }
.progress-top { display:flex; justify-content:space-between; margin-bottom:8px; }
.progress-label { color:rgba(255,255,255,.7); font-size:13px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
.progress-bar { height:8px; background:rgba(255,255,255,.15); border-radius:20px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,#6c2cff,#ff2c78); border-radius:20px; transition:width .5s cubic-bezier(.4,0,.2,1); }
.q-card { background:#1a1630; border-radius:28px; padding:28px; width:100%; max-width:680px; box-shadow:0 20px 60px rgba(0,0,0,.5); border:1.5px solid rgba(255,255,255,.08); }
.q-type-badge { display:inline-block; background:linear-gradient(135deg,#6c2cff,#ff2c78); color:#fff; font-size:11px; font-weight:800; letter-spacing:2px; text-transform:uppercase; border-radius:30px; padding:5px 16px; margin-bottom:14px; }
.q-text { font-family:'Fredoka One',cursive; font-size:24px; color:#fff; line-height:1.3; margin-bottom:8px; }
.q-hint { font-size:13px; color:rgba(255,255,255,.45); margin-bottom:18px; }
.illusion-wrap { background:#f5f0e8; border-radius:20px; padding:16px; margin-bottom:20px; display:flex; justify-content:center; align-items:center; min-height:220px; }
.illusion-wrap svg { max-width:100%; height:auto; }
.options-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.opt-btn { background:rgba(255,255,255,.06); border:1.5px solid rgba(255,255,255,.12); border-radius:16px; padding:14px 16px; color:#fff; font-family:'Nunito',sans-serif; font-size:15px; font-weight:700; cursor:pointer; text-align:left; transition:all .2s; display:flex; align-items:center; gap:10px; }
.opt-btn:hover { background:rgba(108,44,255,.25); border-color:rgba(108,44,255,.6); transform:translateY(-2px); }
.opt-btn.selected { background:linear-gradient(135deg,rgba(108,44,255,.4),rgba(255,44,120,.3)); border-color:#ff2c78; }
.opt-icon { font-size:24px; flex-shrink:0; }
.two-img-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:8px; }
.img-choice { border-radius:18px; overflow:hidden; cursor:pointer; border:3px solid transparent; transition:all .25s; position:relative; background:#f5f0e8; display:flex; flex-direction:column; align-items:center; }
.img-choice:hover { border-color:#6c2cff; transform:scale(1.02); }
.img-choice.selected { border-color:#ff2c78; box-shadow:0 0 28px rgba(255,44,120,.4); }
.img-choice svg { width:100%; }
.img-choice-label { background:linear-gradient(transparent,rgba(0,0,0,.75)); color:#fff; font-weight:800; font-size:14px; text-align:center; padding:18px 8px 10px; width:100%; }
.btn-next { margin-top:20px; background:linear-gradient(135deg,#6c2cff,#ff2c78); color:#fff; font-family:'Fredoka One',cursive; font-size:22px; border:none; border-radius:60px; padding:14px 44px; cursor:pointer; box-shadow:0 8px 30px rgba(108,44,255,.4); transition:all .2s; opacity:.35; pointer-events:none; }
.btn-next.ready { opacity:1; pointer-events:all; }
.btn-next.ready:hover { transform:scale(1.05); }
@keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation:fadeUp .4s ease; }
.result-card { background:#1a1630; border-radius:30px; padding:36px 32px; width:100%; max-width:680px; box-shadow:0 30px 80px rgba(0,0,0,.6); border:1.5px solid rgba(255,255,255,.1); text-align:center; }
.result-aura { width:110px; height:110px; border-radius:50%; margin:0 auto 18px; display:flex; align-items:center; justify-content:center; font-size:54px; animation:pulseAura 3s ease-in-out infinite; }
@keyframes pulseAura { 0%,100%{box-shadow:0 0 28px rgba(108,44,255,.4)} 50%{box-shadow:0 0 56px rgba(255,44,120,.6)} }
.result-label { font-size:12px; font-weight:800; letter-spacing:3px; text-transform:uppercase; color:#ff2c78; margin-bottom:8px; }
.result-title { font-family:'Fredoka One',cursive; font-size:38px; color:#fff; margin-bottom:10px; line-height:1.2; }
.result-tagline { font-size:17px; color:rgba(255,255,255,.7); line-height:1.6; margin-bottom:24px; }
.traits-row { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:24px; }
.trait-pill { background:rgba(108,44,255,.25); border:1px solid rgba(108,44,255,.4); border-radius:30px; padding:7px 16px; font-size:13px; font-weight:700; color:#c4b5fd; }
.result-sections { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:22px; text-align:left; }
.result-box { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:18px; padding:18px; }
.result-box-icon { font-size:26px; margin-bottom:6px; }
.result-box-title { font-size:11px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,.45); margin-bottom:5px; }
.result-box-text { font-size:14px; color:#fff; font-weight:600; line-height:1.5; }
.suppress-box { background:linear-gradient(135deg,rgba(108,44,255,.2),rgba(255,44,120,.15)); border:1.5px solid rgba(108,44,255,.3); border-radius:18px; padding:18px 22px; margin-bottom:22px; text-align:left; }
.suppress-title { font-size:11px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#a78bfa; margin-bottom:7px; }
.suppress-text { font-size:14px; color:rgba(255,255,255,.8); line-height:1.6; }
.try-box { background:rgba(255,255,255,.05); border-radius:18px; padding:18px 22px; margin-bottom:24px; text-align:left; }
.btn-restart { background:rgba(255,255,255,.1); border:1.5px solid rgba(255,255,255,.2); color:#fff; font-family:'Fredoka One',cursive; font-size:20px; border-radius:60px; padding:13px 38px; cursor:pointer; transition:all .2s; }
.btn-restart:hover { background:rgba(255,255,255,.18); transform:scale(1.04); }
.confetti-piece { position:fixed; pointer-events:none; z-index:9999; border-radius:2px; animation:confettiFall linear forwards; }
@keyframes confettiFall { 0%{opacity:1;transform:translateY(-20px) rotate(0deg)} 100%{opacity:0;transform:translateY(100vh) rotate(720deg)} }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div id="app">

  <div class="screen active" id="screen-intro">
    <div class="intro-blob fade-in">
      <span class="intro-emoji">🧠✨</span>
      <div class="intro-title">What Does Your Mind See?</div>
      <div class="intro-sub">A magical quiz that reads your personality through what you notice first — illusions, images & instincts!</div>
      <div class="tag-row">
        <span class="tag">10 Questions</span>
        <span class="tag">Optical Illusions</span>
        <span class="tag">Your True Self</span>
        <span class="tag">~3 mins</span>
      </div>
      <button class="btn-start" onclick="startQuiz()">Let's Go! 🚀</button>
    </div>
  </div>

  <div class="screen" id="screen-question">
    <div class="progress-wrap">
      <div class="progress-top">
        <span class="progress-label" id="q-counter">Question 1 of 10</span>
        <span class="progress-label" id="q-pts">🌟 0 pts</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="q-card fade-in" id="q-card"></div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Next ➜</button>
  </div>

  <div class="screen" id="screen-result"></div>
</div>

<script>
// ── STARS ──────────────────────────────────────────────────────
(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<70;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*3+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s;`;
    c.appendChild(s);
  }
})();

// ── STATE ──────────────────────────────────────────────────────
let currentQ=0, selectedAnswer=null;
let traitScores={dreamer:0,explorer:0,healer:0,builder:0};
let pendingTraits=[];

// ── HELPERS ────────────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function startQuiz(){
  currentQ=0; selectedAnswer=null;
  traitScores={dreamer:0,explorer:0,healer:0,builder:0};
  pendingTraits=[];
  showScreen('screen-question');
  renderQuestion();
}

// ── RENDER ─────────────────────────────────────────────────────
function renderQuestion(){
  const q=QUESTIONS[currentQ];
  document.getElementById('progress-fill').style.width=((currentQ/QUESTIONS.length)*100)+'%';
  document.getElementById('q-counter').textContent=`Question ${currentQ+1} of ${QUESTIONS.length}`;
  selectedAnswer=null;
  document.getElementById('btn-next').classList.remove('ready');

  let html=`<div class="q-type-badge">${q.badge}</div>`;
  html+=`<div class="q-text">${q.text}</div>`;
  if(q.hint) html+=`<div class="q-hint">💫 ${q.hint}</div>`;

  if(q.type==='choice'){
    html+=`<div class="two-img-grid">
      <div class="img-choice" id="choiceA" onclick="selectChoice('A')">
        ${ILLUSIONS[q.choiceA.illusion]}
        <div class="img-choice-label">${q.choiceA.label}</div>
      </div>
      <div class="img-choice" id="choiceB" onclick="selectChoice('B')">
        ${ILLUSIONS[q.choiceB.illusion]}
        <div class="img-choice-label">${q.choiceB.label}</div>
      </div>
    </div>`;
  } else {
    if(q.illusion){
      html+=`<div class="illusion-wrap">${ILLUSIONS[q.illusion]}</div>`;
    }
    html+=`<div class="options-grid">`;
    q.options.forEach(opt=>{
      html+=`<button class="opt-btn" onclick="selectOpt('${opt.value}',this)">
        <span class="opt-icon">${opt.icon}</span>
        <span>${opt.text}</span>
      </button>`;
    });
    html+=`</div>`;
  }

  const card=document.getElementById('q-card');
  card.innerHTML=html;
  card.style.animation='none'; card.offsetHeight; card.style.animation='fadeUp .4s ease';
}

function selectOpt(value,btn){
  document.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedAnswer=value;
  const q=QUESTIONS[currentQ];
  pendingTraits=(q.traits&&q.traits[value])||[];
  document.getElementById('btn-next').classList.add('ready');
}

function selectChoice(side){
  document.getElementById('choiceA').classList.remove('selected');
  document.getElementById('choiceB').classList.remove('selected');
  document.getElementById('choice'+side).classList.add('selected');
  selectedAnswer=side;
  const q=QUESTIONS[currentQ];
  pendingTraits=(q.traits&&q.traits[side])||[];
  document.getElementById('btn-next').classList.add('ready');
}

function nextQuestion(){
  if(!selectedAnswer) return;
  pendingTraits.forEach(t=>{
    const m=TRAIT_MAP[t.toLowerCase()];
    if(m) traitScores[m]++;
  });
  pendingTraits=[];
  currentQ++;
  if(currentQ>=QUESTIONS.length) showResult();
  else renderQuestion();
}

// ── RESULT ─────────────────────────────────────────────────────
function showResult(){
  let top='dreamer', best=-1;
  Object.entries(traitScores).forEach(([k,v])=>{ if(v>best){best=v;top=k;} });
  const p=PERSONALITIES[top];
  const pills=p.traits.map(t=>`<span class="trait-pill">${t}</span>`).join('');
  const tryHtml=p.try.map(t=>`<div style="padding:6px 0;font-size:14px;color:rgba(255,255,255,.8);border-bottom:1px solid rgba(255,255,255,.06);">✦ ${t}</div>`).join('');

  document.getElementById('screen-result').innerHTML=`
    <div class="result-card fade-in">
      <div class="result-aura" style="background:${p.bg}">${p.emoji}</div>
      <div class="result-label">Your Personality Type</div>
      <div class="result-title">${p.title}</div>
      <div class="result-tagline">${p.tagline}</div>
      <div class="traits-row">${pills}</div>
      <div class="result-sections">
        <div class="result-box">
          <div class="result-box-icon">🌟</div>
          <div class="result-box-title">Your True Self</div>
          <div class="result-box-text">${p.trueself}</div>
        </div>
        <div class="result-box">
          <div class="result-box-icon">🎁</div>
          <div class="result-box-title">Your Gift</div>
          <div class="result-box-text">${p.gift}</div>
        </div>
        <div class="result-box" style="grid-column:1/-1">
          <div class="result-box-icon">⚡</div>
          <div class="result-box-title">Your Hidden Edge</div>
          <div class="result-box-text">${p.growth}</div>
        </div>
      </div>
      <div class="suppress-box">
        <div class="suppress-title">🔮 What You Might Be Suppressing</div>
        <div class="suppress-text">${p.suppress}</div>
      </div>
      <div class="try-box">
        <div style="font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#a78bfa;margin-bottom:10px;">💡 Try This This Week</div>
        ${tryHtml}
      </div>
      <button class="btn-restart" onclick="restartQuiz()">🔄 Try Again</button>
    </div>`;
  showScreen('screen-result');
  launchConfetti();
}

function restartQuiz(){
  currentQ=0; selectedAnswer=null;
  traitScores={dreamer:0,explorer:0,healer:0,builder:0};
  pendingTraits=[];
  showScreen('screen-intro');
}

function launchConfetti(){
  const cols=['#6c2cff','#ff2c78','#f59e0b','#10b981','#60a5fa','#fff'];
  for(let i=0;i<70;i++){
    setTimeout(()=>{
      const el=document.createElement('div'); el.className='confetti-piece';
      const sz=6+Math.random()*10;
      el.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${sz}px;height:${sz}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),4000);
    },i*35);
  }
}
